  .stat-num { font-size: 22px; font-weight: 900; color: #E85D26; line-height: 1; }
  .stat-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
  .progress-bar { width: 200px; height: 8px; background: #333; border-radius: 100px; overflow: hidden; }
  .progress-fill { height: 100%; background: #E85D26; border-radius: 100px; transition: width .4s; }

  .controls { padding: 16px 24px; background: white; border-bottom: 1px solid #e0e0e0; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .filter-btn { padding: 6px 14px; border-radius: 100px; border: 1.5px solid #ddd; background: white; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .filter-btn:hover { border-color: #E85D26; color: #E85D26; }
  .filter-btn.active { background: #E85D26; color: white; border-color: #E85D26; }
  .filter-btn.green { border-color: #22c55e; color: #22c55e; }
  .filter-btn.green.active { background: #22c55e; color: white; }

  .main { padding: 20px 24px; max-width: 1100px; margin: 0 auto; }

  .cat-section { margin-bottom: 32px; }
  .cat-title {
    font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
    color: #E85D26; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid #E85D26;
    display: flex; align-items: center; gap: 8px;
  }
  .cat-count { font-size: 10px; color: #999; font-weight: 600; margin-left: auto; }

  .product-group { margin-bottom: 12px; background: white; border-radius: 12px; overflow: hidden; border: 1.5px solid #e8e8e8; }
  .product-group.done { border-color: #bbf7d0; background: #f0fdf4; }
  .group-header {
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
    cursor: pointer; user-select: none;
  }
  .group-name { font-weight: 700; font-size: 14px; flex: 1; }
  .product-group.done .group-name { color: #16a34a; }
  .group-marca { font-size: 11px; color: #999; background: #f0f0f0; padding: 2px 8px; border-radius: 100px; }
  .group-progress { font-size: 11px; color: #999; white-space: nowrap; }
  .product-group.done .group-progress { color: #16a34a; font-weight: 700; }

  .variants { padding: 0 16px 12px; display: flex; flex-wrap: wrap; gap: 8px; }
  .variant {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: 8px; border: 1.5px solid #e0e0e0;
    cursor: pointer; transition: all .15s; background: white; min-width: 130px;
  }
  .variant:hover { border-color: #E85D26; }
  .variant.checked { background: #f0fdf4; border-color: #22c55e; }
  .variant input[type=checkbox] { width: 16px; height: 16px; accent-color: #22c55e; cursor: pointer; flex-shrink: 0; }
  .variant-label { display: flex; flex-direction: column; gap: 1px; }
  .variant-id { font-size: 10px; color: #999; font-family: monospace; }
  .variant-lts { font-size: 13px; font-weight: 700; }
  .variant.checked .variant-lts { color: #16a34a; }
  .variant-file { font-size: 9px; color: #bbb; font-family: monospace; }
  .variant.checked .variant-file { color: #86efac; }

  .cat-title.prio-1 { color: #ef4444; border-color: #ef4444; }
  .cat-title.prio-2 { color: #f97316; border-color: #f97316; }
  .cat-title.prio-3 { color: #eab308; border-color: #eab308; }
  .cat-title.prio-4 { color: #999; border-color: #ddd; }
  .prio-desc { font-size: 12px; color: #999; margin: -6px 0 12px; font-style: italic; }

  @media(max-width:600px) {
    .main { padding: 12px; }
    .controls { padding: 12px; }
    .variant { min-width: 110px; }
    .stats { gap: 10px; }
    .progress-bar { display: none; }
  }
</style>

  {id:138,cat:"Sintetico",nom:"Dupaint Revestimiento Rodillo Blanco/Tintométrico",marca:"Dupaint",lts:5},
  {id:139,cat:"Sintetico",nom:"Dupaint Revestimiento Rodillo Blanco/Tintométrico",marca:"Dupaint",lts:15},
  {id:140,cat:"Sintetico",nom:"Dupaint Revestimiento Rodillo Blanco/Tintométrico",marca:"Dupaint",lts:25},
  {id:141,cat:"Sintetico",nom:"Dupaint Revestimiento Rodillo Standard",marca:"Dupaint",lts:4},
  {id:142,cat:"Sintetico",nom:"Dupaint Revestimiento Rodillo Standard",marca:"Dupaint",lts:10},
  {id:143,cat:"Sintetico",nom:"Dupaint Revestimiento Rodillo Standard",marca:"Dupaint",lts:20},
];

const CATS = ['Membranas','Latex','Sintetico','Otros'];
const CAT_LABELS = { Membranas:'🛡️ Membranas', Latex:'🎨 Látex', Sintetico:'⚗️ Sintético', Otros:'🔧 Otros' };

// Prioridades visuales
// P1: Tarjetas destacadas arriba del catálogo
const P1_IDS = new Set([4, 69, 61]);
// P2: Star cards (tarjetas con fondo en el scroll)
const P2_IDS = new Set([61, 69, 73, 12, 8, 24, 35]);
// P3: Caballitos de batalla completos (todas sus presentaciones)
const P3_NOMS = new Set([
  "Dupaint Látex Pro Lavable Int/Ext",       // premium látex
  "Dupaint Látex Profesional Int/Ext",        // medio látex
  "Zi-Muro Látex Int/Ext",                   // eco látex
  "Dupaint Membrana Caucho+Poliuretánica",   // premium membrana
  "Dupaint Membrana Poliuretánica+Elastomérica", // medio membrana
  "Dupaint Membrana Poliuretánica",          // eco membrana
  "Zi-Muro Membrana Líquida",               // eco membrana 2
]);

function getPriority(prod) {
  if (P1_IDS.has(prod.id)) return 1;
  if (P2_IDS.has(prod.id)) return 2;
  if (P3_NOMS.has(prod.nom)) return 3;
  return 4;
}

const PRIORITY_LABELS = {
  1: { label: '🔴 P1 — Tarjetas destacadas', desc: 'Aparecen arriba del catálogo, visibles sin scrollear' },
  2: { label: '🟠 P2 — Star cards del scroll', desc: 'Tarjetas con imagen de fondo, primeras en verse' },
  3: { label: '🟡 P3 — Caballitos de batalla', desc: 'Los 8 productos estrella recomendados por el dueño' },
  4: { label: '⚪ P4 — Resto del catálogo', desc: 'Se ven solo al filtrar por categoría' },
};

let checked = JSON.parse(localStorage.getItem('dv_fotos') || '{}');
let currentFilter = 'all';

function ltsLabel(l) {
  if (l < 1) return (l * 1000) + ' ml';
  if (Number.isInteger(l)) return l + (l === 1 ? ' lt' : ' lts');
  return l + ' lts';
}

function save() {
  localStorage.setItem('dv_fotos', JSON.stringify(checked));
  updateStats();
}

function toggle(id) {
  checked[id] = !checked[id];
  save();
  render();
}

function updateStats() {
  const done = Object.values(checked).filter(Boolean).length;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statPct').textContent = Math.round(done/143*100) + '%';
  document.getElementById('progressFill').style.width = (done/143*100) + '%';
}

function resetAll() {
  if (!confirm('¿Resetear todo el checklist?')) return;
  checked = {};
  save();
  render();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function renderGroups(prods) {
  const groups = {};
  prods.forEach(p => {
    if (!groups[p.nom]) groups[p.nom] = { nom: p.nom, cat: p.cat, marca: p.marca, variants: [] };
    groups[p.nom].variants.push(p);
  });
  return Object.values(groups).map(g => {
    const allDone = g.variants.every(v => checked[v.id]);
    const doneCnt = g.variants.filter(v => checked[v.id]).length;
    return `<div class="product-group ${allDone ? 'done' : ''}">
      <div class="group-header">
        <div class="group-name">${g.nom}</div>
        <span class="group-marca">${g.marca !== '-' ? g.marca : ''}</span>
        <span class="group-progress">${doneCnt}/${g.variants.length} ${allDone ? '✅' : ''}</span>
      </div>
      <div class="variants">
        ${g.variants.map(v => `
        <div class="variant ${checked[v.id] ? 'checked' : ''}" onclick="toggle(${v.id})">
          <input type="checkbox" ${checked[v.id] ? 'checked' : ''} onclick="event.stopPropagation();toggle(${v.id})">
          <div class="variant-label">
            <div class="variant-id">prod_${v.id}.jpg</div>
            <div class="variant-lts">${ltsLabel(v.lts)}</div>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function render() {
  const main = document.getElementById('main');
  let prods = PRODUCTS;

  if (currentFilter === 'done') prods = prods.filter(p => checked[p.id]);
  else if (currentFilter === 'pending') prods = prods.filter(p => !checked[p.id]);
  else if (currentFilter !== 'all') prods = prods.filter(p => p.cat === currentFilter);

  if (prods.length === 0) {
    main.innerHTML = '<div class="empty">🎉 ¡Todo listo en esta sección!</div>';
    updateStats(); return;
  }

  const byPriority = currentFilter === 'all' || currentFilter === 'done' || currentFilter === 'pending';
  let html = '';

  if (byPriority) {
    [1,2,3,4].forEach(prio => {
      const prioProds = prods.filter(p => getPriority(p) === prio);
      if (!prioProds.length) return;
      const pl = PRIORITY_LABELS[prio];
      const done = prioProds.filter(p => checked[p.id]).length;
      html += `<div class="cat-section">
        <div class="cat-title prio-${prio}">${pl.label}<span class="cat-count">${done}/${prioProds.length}</span></div>
        <div class="prio-desc">${pl.desc}</div>
        ${renderGroups(prioProds)}
      </div>`;
    });
  } else {
    const done = prods.filter(p => checked[p.id]).length;
    html += `<div class="cat-section">
      <div class="cat-title">${CAT_LABELS[currentFilter]}<span class="cat-count">${done}/${prods.length}</span></div>
      ${renderGroups(prods)}
    </div>`;
  }

  main.innerHTML = html;
  updateStats();
}

render();
</script>
</body>
</html>
